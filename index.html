<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kiosk.nj.menzer.org</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
        }

        .container {
            width: 100%;
            max-width: 640px;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 500;
            color: #555;
            letter-spacing: 0.08em;
            margin-bottom: 2.5rem;
        }

        h1 span {
            color: #888;
        }

        .pages {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .page-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #141414;
            border: 1px solid #222;
            border-radius: 10px;
            padding: 1.2rem 1.5rem;
            text-decoration: none;
            transition: border-color 0.15s, background 0.15s;
        }

        .page-card:hover {
            background: #1a1a1a;
            border-color: #444;
        }

        .page-info {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .page-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        .page-desc {
            font-size: 0.85rem;
            color: #666;
        }

        .page-url {
            font-size: 0.8rem;
            font-weight: 500;
            color: #444;
            letter-spacing: 0.03em;
        }

        .arrow {
            color: #333;
            font-size: 1.2rem;
        }

        .info {
            border-top: 1px solid #1a1a1a;
            padding-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .info-block h2 {
            font-size: 0.75rem;
            font-weight: 600;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
        }

        .info-block p {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.6;
        }

        .info-block code {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.85rem;
            background: #161616;
            color: #aaa;
            padding: 0.15em 0.4em;
            border-radius: 4px;
        }

        a.repo-link {
            color: #556;
            text-decoration: none;
            border-bottom: 1px solid #333;
            transition: color 0.15s, border-color 0.15s;
        }

        a.repo-link:hover {
            color: #aaa;
            border-color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>kiosk<span>.nj.menzer.org</span></h1>

        <div class="pages">
            <a class="page-card" href="/screensaver">
                <div class="page-info">
                    <div class="page-name">Screensaver</div>
                    <div class="page-desc">Clock, date, and local weather — for Fully Kiosk tablets</div>
                    <div class="page-url">/screensaver</div>
                </div>
                <div class="arrow">›</div>
            </a>
        </div>

        <div class="info">
            <div class="info-block">
                <h2>Adding a page</h2>
                <p>Add an <code>.html</code> file to the <a class="repo-link" href="https://github.com/smenzer/kiosk-screensaver" target="_blank">GitHub repo</a>, update <code>index.html</code> with a link, then run <code>./deploy.sh</code> to push to the server.</p>
            </div>
        </div>
    </div>
</body>
</html>
